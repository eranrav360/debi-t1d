name: Keep Render warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -sf https://debi-t1d.onrender.com/api/ping \
            -o /dev/null -w "HTTP %{http_code}\n" || true
